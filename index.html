<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCalc Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-buttons">
    <button id="themeBtn">🌙 Dark Mode</button>
    <button id="voiceBtn">🎤 Voice Input</button>
</div>

<div class="container">

    <div class="calculator">

        <input type="text" id="display" readonly>

        <div class="buttons">

            <button onclick="clearDisplay()">C</button>
            <button onclick="deleteLast()">⌫</button>
            <button onclick="appendValue('(')">(</button>
            <button onclick="appendValue(')')">)</button>

            <button onclick="appendValue('sqrt(')">√</button>
            <button onclick="appendValue('sin(')">sin</button>
            <button onclick="appendValue('cos(')">cos</button>
            <button onclick="appendValue('tan(')">tan</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('/')">÷</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('*')">×</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('-')">−</button>

            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button onclick="calculate()">=</button>
            <button onclick="appendValue('+')">+</button>

        </div>

    </div>

    <div class="history">
        <h3>History</h3>
        <button onclick="clearHistory()">Clear History</button>
        <ul id="historyList"></ul>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
